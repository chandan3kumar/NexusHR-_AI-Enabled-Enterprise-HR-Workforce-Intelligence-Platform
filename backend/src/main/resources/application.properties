spring.application.name=nexus

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexushrDb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:chandanjava}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8081}
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkeymysecretkey}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8090,http://localhost:3000,http://localhost:5173}

app.bootstrap.admin.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
app.bootstrap.admin.username=${ADMIN_BOOTSTRAP_USERNAME:admin}
app.bootstrap.admin.email=${ADMIN_BOOTSTRAP_EMAIL:admin@nexushr.local}
app.bootstrap.admin.password=${ADMIN_BOOTSTRAP_PASSWORD:}
